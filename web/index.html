<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QST | 系统监控中心</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.10.0/mqtt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</head>
<body>
    <div class="scanline"></div>
    <div class="grid-bg"></div>

    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none">
                        <polygon points="20,2 38,12 38,28 20,38 2,28 2,12" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <polygon points="20,8 32,15 32,25 20,32 8,25 8,15" stroke="currentColor" stroke-width="1" fill="none" opacity="0.5"/>
                        <circle cx="20" cy="20" r="4" fill="currentColor"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>QST</h1>
                    <span class="subtitle">系统监控中心 v2.0</span>
                </div>
            </div>
            <div class="header-status">
                <div class="status-item">
                    <span class="status-label">系统状态</span>
                    <span class="status-value online" id="systemStatus">在线</span>
                </div>
                <div class="status-item">
                    <span class="status-label">数据节点</span>
                    <span class="status-value" id="nodeCount">5</span>
                </div>
                <div class="connection-module">
                    <div class="conn-indicator">
                        <span id="connectionIndicator" class="indicator offline"></span>
                        <span id="connectionText">未连接</span>
                    </div>
                    <div class="conn-broker">i10a1ac9.ala.cn-hangzhou.emqxsl.cn:8084</div>
                </div>
            </div>
        </header>

        <div class="main-grid">
            <div class="metric-card cpu" data-topic="sys/cpu">
                <div class="card-glow"></div>
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="4" y="4" width="16" height="16" rx="2"/>
                            <rect x="9" y="9" width="6" height="6"/>
                            <line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/>
                            <line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/>
                            <line x1="2" y1="9" x2="4" y2="9"/><line x1="2" y1="15" x2="4" y2="15"/>
                            <line x1="20" y1="9" x2="22" y2="9"/><line x1="20" y1="15" x2="22" y2="15"/>
                        </svg>
                    </div>
                    <span class="card-title">CPU 使用率</span>
                </div>
                <div class="card-body">
                    <div class="gauge-container">
                        <div class="gauge-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="gauge-bg" cx="60" cy="60" r="52"/>
                                <circle class="gauge-fill" cx="60" cy="60" r="52" id="cpuGauge"/>
                            </svg>
                            <div class="gauge-center">
                                <span class="gauge-value" id="cpuValue">--</span>
                                <span class="gauge-unit">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="cpuChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="metric-card memory" data-topic="sys/memory">
                <div class="card-glow"></div>
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="3" y="6" width="18" height="12" rx="1"/>
                            <line x1="7" y1="10" x2="7" y2="14"/>
                            <line x1="11" y1="10" x2="11" y2="14"/>
                            <line x1="15" y1="10" x2="15" y2="14"/>
                        </svg>
                    </div>
                    <span class="card-title">内存使用</span>
                </div>
                <div class="card-body">
                    <div class="gauge-container">
                        <div class="gauge-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="gauge-bg" cx="60" cy="60" r="52"/>
                                <circle class="gauge-fill" cx="60" cy="60" r="52" id="memoryGauge"/>
                            </svg>
                            <div class="gauge-center">
                                <span class="gauge-value" id="memoryValue">--</span>
                                <span class="gauge-unit">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="info-row">
                        <span class="info-label">已用</span>
                        <span class="info-value" id="memoryUsed">-- GB</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">总量</span>
                        <span class="info-value" id="memoryTotal">-- GB</span>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="memoryChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="metric-card disk" data-topic="sys/disk">
                <div class="card-glow"></div>
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <ellipse cx="12" cy="12" rx="9" ry="9"/>
                            <circle cx="12" cy="12" r="3"/>
                            <circle cx="12" cy="12" r="6" stroke-dasharray="2 2"/>
                        </svg>
                    </div>
                    <span class="card-title">磁盘存储</span>
                </div>
                <div class="card-body">
                    <div class="gauge-container">
                        <div class="gauge-ring">
                            <svg viewBox="0 0 120 120">
                                <circle class="gauge-bg" cx="60" cy="60" r="52"/>
                                <circle class="gauge-fill" cx="60" cy="60" r="52" id="diskGauge"/>
                            </svg>
                            <div class="gauge-center">
                                <span class="gauge-value" id="diskValue">--</span>
                                <span class="gauge-unit">%</span>
                            </div>
                        </div>
                    </div>
                    <div class="info-row">
                        <span class="info-label">已用</span>
                        <span class="info-value" id="diskUsed">-- GB</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">总量</span>
                        <span class="info-value" id="diskTotal">-- GB</span>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="diskChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="metric-card temperature" data-topic="sensor/temperature">
                <div class="card-glow"></div>
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2v10"/>
                            <circle cx="12" cy="16" r="6"/>
                            <line x1="12" y1="22" x2="12" y2="16"/>
                            <circle cx="12" cy="16" r="2" fill="currentColor"/>
                        </svg>
                    </div>
                    <span class="card-title">环境温度</span>
                </div>
                <div class="card-body">
                    <div class="big-value">
                        <span class="value-num" id="tempValue">--</span>
                        <span class="value-unit">℃</span>
                    </div>
                    <div class="chart-wrapper small">
                        <canvas id="tempChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="metric-card humidity" data-topic="sensor/humidity">
                <div class="card-glow"></div>
                <div class="card-header">
                    <div class="card-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                        </svg>
                    </div>
                    <span class="card-title">环境湿度</span>
                </div>
                <div class="card-body">
                    <div class="big-value">
                        <span class="value-num" id="humidityValue">--</span>
                        <span class="value-unit">%</span>
                    </div>
                    <div class="chart-wrapper small">
                        <canvas id="humidityChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="data-stream">
                <span class="stream-label">实时数据流</span>
                <div class="stream-indicators">
                    <span class="stream-dot" id="cpuStream"></span>
                    <span class="stream-dot" id="memStream"></span>
                    <span class="stream-dot" id="diskStream"></span>
                    <span class="stream-dot" id="tempStream"></span>
                    <span class="stream-dot" id="humStream"></span>
                </div>
            </div>
            <div class="timestamp">
                <span id="lastUpdate">等待数据...</span>
            </div>
        </footer>
    </div>

    <script src="js/mqtt-client.js"></script>
    <script src="js/chart-handler.js"></script>
</body>
</html>
